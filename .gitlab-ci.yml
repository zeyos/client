stages:
- test
- build
- publish
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

# ── Live agent test protocol ──────────────────────────────────────────────────
# Drives a coding agent against the demo instance and classifies failures with the
# model-rotation rule (see test/agent-protocol/PROTOCOL.md). It needs live OAuth
# tokens + paid model keys, so it is NEVER run automatically on a merge request:
# it runs on scheduled pipelines and can be triggered manually on a branch.
#
# Required CI/CD variables (Settings → CI/CD → Variables):
#   AGENT_PROTOCOL_CONFIG  (File)   — full config.test.json (live OAuth block + agentProtocol)
#   OPENROUTER_API_KEY     (Masked) — model access for openrouter/* rotation entries
# The runner binary (opencode) must be installable in the image, or bake it into a
# custom image. Ollama is a local-dev tier only; CI uses OpenRouter models.
agent-protocol:
  stage: test
  image: node:22.12
  needs: []
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: on_success
    - if: $CI_COMMIT_BRANCH
      when: manual
      allow_failure: true
  before_script:
    - npm ci --cache .npm --prefer-offline
    - npm i -g opencode-ai
    - cp test/agent-protocol/opencode/opencode.json.example test/agent-protocol/opencode/opencode.json
    - cp "$AGENT_PROTOCOL_CONFIG" config.test.json
  script:
    # Exits non-zero only on CLIENT_DEFECT (real bugs); model flakes do not fail the job.
    - npm run test:agent-protocol
  artifacts:
    when: always
    paths:
      - test/agent-protocol/results/
    expire_in: 30 days

build:
  image: node:22.12-alpine
  stage: build
  variables:
    ENVIRONMENT_NAME: gitlab
  environment:
    name: $ENVIRONMENT_NAME
    action: prepare
  before_script:
    - apk add jq
  artifacts:
    paths:
      - .
  script:
    - |
      if [[ ${IS_BETA} ]]; then
        mv package.json package.json.bak && jq --arg _TAG "-beta-${CI_COMMIT_SHORT_SHA}" '.version += $_TAG' package.json.bak > package.json
        mv package.json package.json.bak && jq --arg _SCOPE "@${CI_PROJECT_ROOT_NAMESPACE}/" '.name |= $_SCOPE + .' package.json.bak > package.json
      else
        PACKAGE_VERSION=$(jq -r '.version' package.json)
        TAG_VERSION=${CI_COMMIT_TAG#v}
        if [[ "$PACKAGE_VERSION" != "$TAG_VERSION" ]]; then
            echo "Version mismatch: package.json has $PACKAGE_VERSION but tag is $TAG_VERSION"
            exit 1
        fi
      fi
    - npm ci --cache .npm --prefer-offline
  rules:
    - if: $CI_COMMIT_TAG
      variables:
        ENVIRONMENT_NAME: npmjs
    - when: on_success

publish-dev:
  image: node:22.12-alpine
  stage: publish
  environment:
    name: gitlab
    action: start
  needs:
    - build
  dependencies:
    - build
  before_script:
    # since we use an unscoped package we need to change to default registry
    - apk add jq
    - npm config set @${CI_PROJECT_ROOT_NAMESPACE}:registry ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/npm/
    # set authToken
    - npm config set ${CI_API_V4_URL#http*:}/projects/${CI_PROJECT_ID}/packages/npm/:_authToken ${CI_JOB_TOKEN}
  script:
    # publish as beta-$COMMIT_SHORT_SHA
    - npm publish --verbose --tag beta-${CI_COMMIT_SHORT_SHA}
    
    # add latest-beta tag
    - |
      VERSION=$(jq -r ".version" package.json)
      NAME=$(jq -r ".name" package.json)
      npm dist-tag add ${NAME}@${VERSION} latest-beta
  rules:
    - if: $CI_COMMIT_TAG == null

publish-npmjs:
  image: node:22.12-alpine
  stage: publish
  environment:
    name: npmjs
    action: start
  needs:
    - build
  dependencies:
    - build
  script:
    - npm publish --verbose
  rules:
    - if: $CI_COMMIT_TAG